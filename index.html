<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Турнирная сетка</title>
<style>
    body {
        margin: 0;
        background: #0f0f14;
        color: white;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin: 20px;
        font-size: 28px;
    }

    .bracket {
        display: flex;
        gap: 60px;
        padding: 20px;
    }

    .group {
        background: #1a1a23;
        padding: 15px;
        border-radius: 12px;
        width: 220px;
        box-shadow: 0 0 15px rgba(0,0,0,0.4);
    }

    .group h2 {
        text-align: center;
        font-size: 18px;
        margin-bottom: 10px;
        color: #ffcc00;
    }

    .team {
        background: #2a2a38;
        margin: 6px 0;
        padding: 8px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        font-size: 14px;
    }

    .qualified {
        border: 1px solid #00ff88;
    }

    .score {
        color: #aaa;
    }

    .playoffs {
        margin-top: 40px;
        display: flex;
        gap: 40px;
    }

    .match {
        background: #1a1a23;
        padding: 10px;
        border-radius: 10px;
        width: 180px;
        text-align: center;
    }

    .vs {
        color: #888;
        margin: 5px 0;
    }
</style>
</head>
<body>

<h1>Турнирная сетка</h1>

<div class="bracket">

    <div class="group">
        <h2>Группа A</h2>
        <div class="team qualified"><span>Team 1</span><span class="score">3-0</span></div>
        <div class="team qualified"><span>Team 2</span><span class="score">2-1</span></div>
        <div class="team"><span>Team 3</span><span class="score">1-2</span></div>
        <div class="team"><span>Team 4</span><span class="score">0-3</span></div>
    </div>

    <div class="group">
        <h2>Группа B</h2>
        <div class="team qualified"><span>Team 5</span><span class="score">3-0</span></div>
        <div class="team qualified"><span>Team 6</span><span class="score">2-1</span></div>
        <div class="team"><span>Team 7</span><span class="score">1-2</span></div>
        <div class="team"><span>Team 8</span><span class="score">0-3</span></div>
    </div>

</div>

<div class="playoffs">

    <div class="match">
        <div>Team 1</div>
        <div class="vs">VS</div>
        <div>Team 6</div>
    </div>

    <div class="match">
        <div>Team 5</div>
        <div class="vs">VS</div>
        <div>Team 2</div>
    </div>

</div>

</body>
</html>
